<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Name Generator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b;
            --bg-card: #18181b;
            --bg-hover: #27272a;
            --border-color: #3f3f46;
            --accent-primary: #6366f1;
            --accent-secondary: #a855f7;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            
            --radius-lg: 24px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle modern background glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, rgba(168,85,247,0.05) 40%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 48px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 80%;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* --- Categories (Mobile Friendly Horizontal Scroll) --- */
        .categories {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            overflow-x: auto;
            padding-bottom: 8px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .categories::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 100px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        .tab.active {
            background: var(--text-main);
            color: var(--bg-base);
            border-color: var(--text-main);
        }

        /* --- Generator Area --- */
        .generator-area {
            text-align: center;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-md);
            padding: 40px 24px;
            margin-bottom: 24px;
            border: 1px dashed var(--border-color);
        }

        #result {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-height: 1.2em; /* Prevents layout jump */
            transition: opacity 0.3s ease, transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #result.loading {
            opacity: 0;
            transform: scale(0.95);
        }

        /* --- Actions --- */
        .actions {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn {
            padding: 16px 24px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
            filter: brightness(1.1);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: #3f3f46;
        }

        /* --- Saved Area --- */
        .saved-area {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        .saved-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .saved-header h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .stats-badge {
            font-size: 0.8rem;
            background: var(--bg-hover);
            padding: 4px 10px;
            border-radius: 100px;
            color: var(--text-muted);
        }

        .saved-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 40px;
        }

        .saved-tag {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818cf8;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .saved-tag:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--accent-primary);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .empty-saved {
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0.5;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 600px) {
            .container { padding: 32px 20px; }
            .actions { grid-template-columns: 1fr; }
            .btn-primary { padding: 20px; font-size: 1.1rem; }
            h1 { font-size: 2rem; }
            .generator-area { padding: 30px 16px; }
            .subtitle { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <main class="container">
        <header class="header">
            <h1>AI Name Generator</h1>
            <p class="subtitle">Discover premium, brandable names for your next big project.</p>
        </header>

        <nav class="categories" id="tabs">
            <button class="tab active" data-category="startup">🚀 Startup</button>
            <button class="tab" data-category="tech">💻 Tech</button>
            <button class="tab" data-category="creative">🎨 Creative</button>
            <button class="tab" data-category="finance">📈 Finance</button>
            <button class="tab" data-category="health">🌿 Health</button>
            <button class="tab" data-category="gaming">🎮 Gaming</button>
        </nav>

        <section class="generator-area">
            <div id="result">Click Generate ✨</div>
        </section>

        <div class="actions">
            <button class="btn btn-primary" onclick="generateName()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                Generate Name
            </button>
            <button class="btn btn-secondary" onclick="copyName()" id="copyBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy
            </button>
            <button class="btn btn-secondary" onclick="saveName()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                Save
            </button>
        </div>

        <section class="saved-area">
            <div class="saved-header">
                <h3>Saved Names</h3>
                <span class="stats-badge" id="statsCounter">0 saved</span>
            </div>
            <div class="saved-list" id="savedList">
                <div class="empty-saved">No names saved yet. Generate and save your favorites!</div>
            </div>
        </section>
    </main>

    <script>
        // Massive Expanded Database
        const nameData = {
            startup: [
                ['Aero', 'Nova', 'Syn', 'Omni', 'Vera', 'Zenith', 'Aura', 'Elev', 'Lumi', 'Nexo'],
                ['Flow', 'Pulse', 'Grid', 'Link', 'Node', 'Sphere', 'Base', 'Shift', 'Scale', 'Sync'],
                ['.io', '.co', '.ai', ' HQ', ' Labs', ' Inc']
            ],
            tech: [
                ['Cyber', 'Quantum', 'Neural', 'Data', 'Byte', 'Logic', 'Cloud', 'Code', 'Net', 'Tech'],
                ['Forge', 'Stream', 'Cast', 'Vault', 'Mind', 'Core', 'Net', 'Sys', 'Wave', 'Stack'],
                ['.ai', '.dev', ' Systems', ' Network', ' Technologies', '']
            ],
            creative: [
                ['Pixel', 'Vivid', 'Muse', 'Spark', 'Glow', 'Dream', 'Art', 'Vision', 'Chroma', 'Lucid'],
                ['Studio', 'Craft', 'Design', 'Ink', 'Frame', 'Canvas', 'Bloom', 'Wave', 'Makers', 'Blend'],
                [' Studio', ' Co', ' Lab', ' Collective', ' Works', '']
            ],
            finance: [
                ['Prime', 'Apex', 'Core', 'Summit', 'Nexus', 'Equi', 'Ledger', 'Trust', 'Wealth', 'Capital'],
                ['Vest', 'Trade', 'Fund', 'Vault', 'Pay', 'Coin', 'Mint', 'Guard', 'Bank', 'Asset'],
                [' Partners', ' Group', ' Financial', ' Capital', ' Advisors', '']
            ],
            health: [
                ['Vital', 'Pure', 'Life', 'Medi', 'Well', 'Bio', 'Natura', 'Cura', 'Sana', 'Omni'],
                ['Care', 'Health', 'Fit', 'Pulse', 'Glow', 'Mind', 'Body', 'Life', 'Leaf', 'Root'],
                [' Wellness', ' Care', ' Clinic', ' Health', ' Medical', '']
            ],
            gaming: [
                ['Neo', 'Shadow', 'Blaze', 'Frost', 'Storm', 'Rage', 'Void', 'Vortex', 'Nitro', 'Pixel'],
                ['Quest', 'Arena', 'Strike', 'Rush', 'Zone', 'Forge', 'Play', 'Core', 'Clash', 'Force'],
                [' Gaming', ' Esports', ' Studios', ' Interactive', ' Pro', '']
            ]
        };

        let currentCategory = 'startup';
        let savedNames = [];
        let currentName = '';

        const resultEl = document.getElementById('result');
        const savedListEl = document.getElementById('savedList');
        const statsCounterEl = document.getElementById('statsCounter');

        // Tab switching logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelector('.tab.active').classList.remove('active');
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                
                // Ensure the clicked tab scrolls into view on mobile
                tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });
        });

        function generateName() {
            // UI Loading effect
            resultEl.classList.add('loading');
            
            setTimeout(() => {
                const category = nameData[currentCategory];
                const prefix = category[0][Math.floor(Math.random() * category[0].length)];
                const middle = category[1][Math.floor(Math.random() * category[1].length)];
                const suffix = category[2][Math.floor(Math.random() * category[2].length)];
                
                // Logic: 50% chance to just be Prefix + Middle. 50% chance to add Suffix/Domain
                if (Math.random() < 0.5) {
                    currentName = prefix + middle;
                } else {
                    currentName = prefix + middle + suffix;
                }
                
                resultEl.textContent = currentName;
                resultEl.classList.remove('loading');
            }, 150); // slight delay for smooth visual transition
        }

        function copyName() {
            if (!currentName) return;
            navigator.clipboard.writeText(currentName).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                btn.style.color = 'var(--accent-primary)';
                btn.style.borderColor = 'var(--accent-primary)';
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 1500);
            });
        }

        function saveName() {
            if (!currentName || savedNames.includes(currentName)) return;
            
            savedNames.unshift(currentName); // Add to beginning of array
            updateSavedList();
        }

        function removeName(nameToRemove) {
            savedNames = savedNames.filter(name => name !== nameToRemove);
            updateSavedList();
        }

        function updateSavedList() {
            statsCounterEl.textContent = `${savedNames.length} saved`;
            
            if (savedNames.length === 0) {
                savedListEl.innerHTML = '<div class="empty-saved">No names saved yet. Generate and save your favorites!</div>';
                return;
            }

            savedListEl.innerHTML = savedNames.map(name => `
                <div class="saved-tag" title="Click to copy">
                    <span onclick="navigator.clipboard.writeText('${name}'); alert('Copied ${name}!')">${name}</span>
                    <svg onclick="removeName('${name}')" style="margin-left: 4px; cursor: pointer; opacity: 0.6; hover: opacity: 1;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
            `).join('');
        }

        // Initialize first name
        generateName();

        // Allow 'Enter' or 'Space' to generate quickly
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateName();
            }
        });
    </script>
</body>
</html>
