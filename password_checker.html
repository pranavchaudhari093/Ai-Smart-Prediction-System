<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Cybersecurity Dark Theme */
            --bg-base: #0b0f19;
            --bg-card: #151b2b;
            --bg-input: #1e2638;
            --border-color: #2a3241;
            --border-focus: #3b82f6;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --danger: #ef4444;    /* Weak */
            --warning: #f59e0b;   /* Fair */
            --info: #3b82f6;      /* Good */
            --success: #10b981;   /* Strong */
            
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* Subtle tech grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- Input Section --- */
        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 18px 90px 18px 48px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        input::placeholder {
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .input-actions {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
        }

        /* --- Strength Meter & Crack Time --- */
        .analysis-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .strength-label {
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .crack-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        .crack-time span {
            font-weight: 600;
            color: var(--text-main);
        }

        .meter-container {
            height: 8px;
            background: var(--bg-input);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
        }

        /* --- Criteria Grid --- */
        .criteria-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        .criterion {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            padding: 10px 12px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .criterion.met {
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--text-main);
        }

        .check-icon {
            width: 16px;
            height: 16px;
            stroke-width: 3;
        }

        .criterion .check-icon { stroke: var(--text-muted); }
        .criterion.met .check-icon { stroke: var(--success); }

        /* --- Action Buttons --- */
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: var(--border-focus);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
        }

        .btn-generate:hover {
            background: #2563eb;
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        /* Colors based on strength */
        .strength-0 { color: var(--text-muted); }
        .strength-1 { color: var(--danger); }
        .strength-2 { color: var(--warning); }
        .strength-3 { color: var(--info); }
        .strength-4 { color: var(--success); }

        .bg-0 { background-color: transparent; }
        .bg-1 { background-color: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .bg-2 { background-color: var(--warning); box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .bg-3 { background-color: var(--info); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .bg-4 { background-color: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
            .criteria-list { grid-template-columns: 1fr; gap: 8px; }
            .analysis-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .crack-time { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--border-focus)"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Password Pro
            </h1>
            <p class="subtitle">Real-time security analysis & entropy estimation</p>
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
            <input type="password" id="password" placeholder="Type your password..." autocomplete="off">
            
            <div class="input-actions">
                <button class="icon-btn" id="toggleBtn" onclick="toggleVisibility()" title="Show Password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
                <button class="icon-btn" onclick="copyPassword()" title="Copy to Clipboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>
        </div>

        <div class="analysis-header">
            <div class="strength-label strength-0" id="strengthText">Waiting...</div>
            <div class="crack-time">Time to crack: <span id="crackTime">0 seconds</span></div>
        </div>

        <div class="meter-container">
            <div class="meter-fill bg-0" id="meterFill"></div>
        </div>

        <div class="criteria-list" id="criteriaList">
            </div>

        <button class="btn-generate" onclick="generatePassword()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            Generate Secure Password
        </button>
    </div>

    <script>
        const passInput = document.getElementById('password');
        const meterFill = document.getElementById('meterFill');
        const strengthText = document.getElementById('strengthText');
        const crackTimeText = document.getElementById('crackTime');
        const criteriaListDiv = document.getElementById('criteriaList');
        
        let isVisible = false;

        // Validation Rules
        const criteria = [
            { id: 'len', label: '12+ Characters', regex: /.{12,}/ },
            { id: 'upper', label: 'Uppercase Letter', regex: /[A-Z]/ },
            { id: 'lower', label: 'Lowercase Letter', regex: /[a-z]/ },
            { id: 'num', label: 'Number', regex: /[0-9]/ },
            { id: 'sym', label: 'Symbol (!@#$)', regex: /[^A-Za-z0-9]/ },
            { id: 'unique', label: 'No Repeating Chars', regex: /^(?:(.)(?!\1{2}))*$/ } // No 3 identical in a row
        ];

        // Setup UI initially
        renderCriteria();

        passInput.addEventListener('input', () => {
            const val = passInput.value;
            updateCriteria(val);
            analyzePassword(val);
        });

        function renderCriteria() {
            criteriaListDiv.innerHTML = criteria.map(c => `
                <div class="criterion" id="crit-${c.id}">
                    <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    ${c.label}
                </div>
            `).join('');
        }

        function updateCriteria(password) {
            criteria.forEach(c => {
                const el = document.getElementById(`crit-${c.id}`);
                // Special handling for the 'unique' rule (it passes if empty, so we must check length)
                const isMet = password.length > 0 && c.regex.test(password);
                
                if (isMet) {
                    el.classList.add('met');
                } else {
                    el.classList.remove('met');
                }
            });
        }

        function analyzePassword(password) {
            if (!password) {
                updateUI(0, 'Waiting...', '0 seconds', 0);
                return;
            }

            // Calculate Entropy (Pool size ^ length)
            let poolSize = 0;
            if (/[a-z]/.test(password)) poolSize += 26;
            if (/[A-Z]/.test(password)) poolSize += 26;
            if (/[0-9]/.test(password)) poolSize += 10;
            if (/[^A-Za-z0-9]/.test(password)) poolSize += 32;

            const entropy = password.length * Math.log2(poolSize || 1);
            
            // Assume offline fast cracking speed (100 Billion guesses/sec)
            const combinations = Math.pow(poolSize, password.length);
            const secondsToCrack = combinations / 100000000000;

            const timeString = formatTime(secondsToCrack);

            // Determine Strength Level (0 to 4)
            let level = 0;
            let label = "Very Weak";
            let percent = 20;

            if (entropy > 100) { level = 4; label = "Unbreakable"; percent = 100; }
            else if (entropy > 75) { level = 3; label = "Strong"; percent = 75; }
            else if (entropy > 50) { level = 2; label = "Fair"; percent = 50; }
            else if (entropy > 25) { level = 1; label = "Weak"; percent = 25; }

            // Deduct points if missing basic criteria (forces diverse passwords)
            const missingTypes = [/[a-z]/, /[A-Z]/, /[0-9]/, /[^A-Za-z0-9]/].filter(r => !r.test(password)).length;
            if (missingTypes > 1 && level > 1) {
                level -= 1; 
                label = "Needs Variety";
                percent -= 15;
            }

            updateUI(level, label, timeString, percent);
        }

        function updateUI(level, label, timeStr, percent) {
            strengthText.textContent = label;
            strengthText.className = `strength-label strength-${level}`;
            crackTimeText.textContent = timeStr;
            
            meterFill.style.width = `${percent}%`;
            meterFill.className = `meter-fill bg-${level}`;
        }

        function formatTime(seconds) {
            if (seconds < 1) return "Instantly";
            if (seconds < 60) return `${Math.floor(seconds)} seconds`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)} minutes`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours`;
            if (seconds < 31536000) return `${Math.floor(seconds / 86400)} days`;
            if (seconds < 3153600000) return `${Math.floor(seconds / 31536000)} years`;
            return "Centuries 💀";
        }

        function toggleVisibility() {
            isVisible = !isVisible;
            passInput.type = isVisible ? 'text' : 'password';
            
            const btn = document.getElementById('toggleBtn');
            btn.innerHTML = isVisible 
                ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`
                : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        }

        function copyPassword() {
            if (!passInput.value) return;
            navigator.clipboard.writeText(passInput.value).then(() => {
                // Show brief success text
                const originalText = crackTimeText.innerHTML;
                crackTimeText.innerHTML = `<span style="color: var(--success)">Copied to clipboard! ✓</span>`;
                setTimeout(() => { crackTimeText.innerHTML = originalText; }, 2000);
            });
        }

        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=';
            let password = '';
            // Generate a secure 16 character password
            for (let i = 0; i < 16; i++) {
                // Cryptographically secure random number generation
                const array = new Uint32Array(1);
                window.crypto.getRandomValues(array);
                password += chars[array[0] % chars.length];
            }
            passInput.value = password;
            passInput.type = 'text'; // Briefly show the generated password
            isVisible = true;
            document.getElementById('toggleBtn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
            
            // Trigger input event to update meters
            passInput.dispatchEvent(new Event('input'));
        }
    </script>
</body>
</html>
